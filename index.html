<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Private Workspace</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    font-family: Georgia, "Times New Roman", serif;
    background: #f7f7f5;
    color: #1a1f2e;
    -webkit-font-smoothing: antialiased;
  }
  .wrap {
    min-height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    max-width: 480px;
    width: 100%;
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    padding: 48px 36px;
    text-align: center;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 8px 24px rgba(0,0,0,0.06);
  }
  .mark {
    display: inline-block;
    width: 48px;
    height: 48px;
    border-radius: 10px;
    background: #1a1f2e;
    color: #fff;
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-weight: 800;
    font-size: 22px;
    line-height: 48px;
    text-align: center;
    margin-bottom: 24px;
    letter-spacing: 0.04em;
  }
  h1 {
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.01em;
    margin-bottom: 12px;
  }
  p {
    color: #6b7280;
    font-size: 15px;
    line-height: 1.6;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="mark">B</div>
    <h1>Private Workspace</h1>
    <p>This is a personal workspace. If you have a direct link, please use it.</p>
  </div>
</div>
</body>
</html>
